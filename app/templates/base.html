<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Food Diary{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="app-header">
        <div class="container header-row">
            <a href="/" class="brand">Food Diary</a>

            <nav class="top-nav">
                {% if user %}
                    <a href="/dashboard" class="{% if request.url.path == '/dashboard' %}active{% endif %}">Dashboard</a>
                    <a href="/diary" class="{% if request.url.path == '/diary' %}active{% endif %}">Diary</a>
                    <a href="/logout">Logout</a>
                {% else %}
                    <a href="/login">Login</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container app-main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
