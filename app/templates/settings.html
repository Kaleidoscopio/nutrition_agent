{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<section class="detail-card">
    <div class="page-head">
        <div class="page-head-main">
            <p class="eyebrow">Account</p>
            <div class="page-head-title-row">
                <h1>Profile settings</h1>
            </div>
        </div>
    </div>

    {% if error %}
        <div class="form-error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="form-success">{{ success }}</div>
    {% endif %}

    <form method="post" action="/settings" class="stack">
        <label>
            Username
            <input type="text" value="{{ profile.user_name }}" disabled>
        </label>

        <label>
            Display name
            <input type="text" name="display_name" value="{{ profile.display_name or '' }}">
        </label>

        <label>
            Email
            <input type="email" name="email" value="{{ profile.email or '' }}">
        </label>

        <label>
            Sex
            <select name="sex" required>
                <option value="male" {% if profile.sex == "male" %}selected{% endif %}>Male</option>
                <option value="female" {% if profile.sex == "female" %}selected{% endif %}>Female</option>
            </select>
        </label>

        <label>
            Date of birth
            <input type="date" name="date_of_birth" value="{{ profile.date_of_birth or '' }}" required>
        </label>

        <label>
            Height (cm)
            <input type="number" step="0.1" name="height_cm" value="{{ profile.height_cm or '' }}" required>
        </label>

        <label>
            Starting weight (kg)
            <input type="number" step="0.1" name="start_weight_kg" value="{{ profile.start_weight_kg or '' }}" required>
        </label>

        <label>
            Activity level
            <select name="activity_level" required>
                {% for value, label in activity_levels.items() %}
                    <option value="{{ value }}" {% if profile.activity_level == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </label>

        <div class="inline-edit-buttons">
            <button type="submit" class="btn btn-primary">Save changes</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
